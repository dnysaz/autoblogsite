name: Auto Generation Articles

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Article
        env:
          DEEPSEEK_API: ${{ secrets.DEEPSEEK_API }}
          ARTICLE_CATEGORIES: "Technology, Artificial Intelligence, Programming, Web Development, Future Trends"
        run: npm run generate

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/articles/
          git commit -m "🤖 Auto-generated article [skip ci]" || echo "No changes to commit"
          git push
